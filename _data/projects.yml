# Open-source projects led by the group.
# Three configuration shapes:
#   - `repo: owner/name`         → single repo, show one star number
#   - `org: orgname`             → series project, JS fetches all repos in the org,
#                                  shows top N by star count
#   - `repo` + `org` is fine     → header card star (repo) + sub-repos list (org)
- name: 'MOSS'
  url: 'https://github.com/OpenMOSS'
  org: 'OpenMOSS'
  feature: true   # render as a tall left-column card that fills the row
  # featured: explicit allow list (case-insensitive); also defines display order.
  featured: ['MOSS', 'MOSS-VL', 'MOSS-Audio', 'MOSS-TTS-Nano', 'MOSS-TTS', 'MOSS-TTSD', 'MOVA']
  desc_zh: '开源对话式大语言模型系列，涵盖文本、视觉、语音等多模态对话能力，提供完整的预训练 / 对齐技术栈。'
  desc_en: 'Open-source conversational LLM series spanning text, vision and speech, with a complete pre-training and alignment stack.'
  badge: 'LLM Series'
- name: 'NNDL'
  url: 'https://github.com/nndl'
  org: 'nndl'
  featured: ['nndl', 'llm-beginner', 'nndl-practice']
  desc_zh: '蒲公英系列教材：《神经网络与深度学习》《大模型与智能体》教程与配套实践。'
  desc_en: 'Neural Networks and Deep Learning textbook series with companion code and tutorials.'
  badge: 'Textbook'
- name: 'FudanNLP'
  url: 'https://github.com/FudanNLP'
  org: 'FudanNLP'
  featured: ['fastNLP', 'fnlp', 'fitlog']
  desc_zh: '团队早期开源的 NLP 工具系列：FastNLP（轻量级工具包）、fnlp（早期中文 NLP 工具包）。'
  desc_en: 'Group''s open-source NLP utilities: FastNLP (lightweight toolkit), fnlp (the earlier Chinese NLP toolkit).'
  badge: 'Toolkit'
- name: 'NEX'
  url: 'https://github.com/nex-agi'
  org: 'nex-agi'
  featured: ['Nex-N1', 'Nex-N2']
  desc_zh: '下一代智能体的开源研究平台，覆盖后训练模型NEX-N1、通用智能体架构、Harness系统等。'
  desc_en: 'Open-source research platform for next-generation AI agents — architectures, reasoning, and tool use.'
  badge: 'Agents Series'
